<!DOCTYPE html>
<html>
<head>
<title>MM Premier League</title>

<style>
body {
    margin: 0;
    background: #0b0b0b;
    color: white;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CENTER BOX */
.container {
    text-align: center;
}

/* TITLE */
.title {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: 2px;
    margin-top: 10px;
}

/* BUTTON */
.enter-btn {
    margin-top: 30px;
    padding: 12px 30px;
    font-size: 16px;
    border: 1px solid #FFD700;
    background: transparent;
    color: #FFD700;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
}

.enter-btn:hover {
    background: #FFD700;
    color: black;
}
</style>

</head>

<body>

<div class="container">

    <div class="title">MM PREMIER LEAGUE</div>

    <a href="players.html">
        <button class="enter-btn">Enter League</button>
    </a>

</div>

</body>
</html>
